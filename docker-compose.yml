# docker-compose.yml

services:
  realworld-app:
    build:
      context: .
      dockerfile: Dockerfile.aut
    network_mode: host
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
