# docker-compose.yml
version: '3.8'

services:
  realworld-app:
    build:
      context: ./apps/cypress-realworld-app
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
