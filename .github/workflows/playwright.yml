# Workflow: Playwright Tests
# Runs the Playwright E2E test suite against the cypress-realworld-app
# Triggers: push and pull_request to main
# Artifacts: Playwright HTML report

name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Start AUT with Docker Compose
        run: docker compose up -d --wait

      - name: Verify AUT is available
        run: |
          echo "Waiting for frontend (port 3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
          echo "Frontend OK"
          echo "Waiting for API (port 3001)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/ > /dev/null 2>&1; do sleep 5; done'
          echo "API OK"

      - name: Container logs (debug)
        if: failure()
        run: docker compose logs --tail=50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright suite
        working-directory: tests/playwright
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/

      - name: Container logs
        if: always()
        run: docker compose logs --tail=100

      - name: Stop AUT
        if: always()
        run: docker compose down
