# Workflow: Cypress Tests
# Runs the Cypress E2E test suite against the cypress-realworld-app
# Triggers: push and pull_request to main
# Artifacts: Mochawesome report

name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Start AUT with Docker Compose
        run: docker compose up -d --wait

      - name: Verify AUT is available
        run: |
          echo "Waiting for frontend (port 3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
          echo "Frontend OK"
          echo "Waiting for API (port 3001)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/ > /dev/null 2>&1; do sleep 5; done'
          echo "API OK"

      - name: Container logs (debug)
        if: failure()
        run: docker compose logs --tail=50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cypress dependencies
        working-directory: tests/cypress
        run: npm ci

      - name: Run Cypress suite
        working-directory: tests/cypress
        run: |
          curl -sf http://localhost:3000 > /dev/null 2>&1 || echo "WARNING: AUT may not be available"
          npx cypress run

      - name: Upload Cypress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: tests/cypress/reports/

      - name: Container logs
        if: always()
        run: docker compose logs --tail=100

      - name: Stop AUT
        if: always()
        run: docker compose down
