# Workflow: Cypress Tests
# Ejecuta la suite de pruebas E2E de Cypress contra la cypress-realworld-app
# Triggers: push y pull_request a la rama main
# Artefactos: reporte mochawesome de Cypress

name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Levantar AUT con Docker Compose
        run: docker compose up -d --wait

      - name: Verificar que la AUT está disponible
        run: |
          echo "Esperando frontend (puerto 3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
          echo "Frontend OK"
          echo "Esperando API (puerto 3001)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/users > /dev/null 2>&1; do sleep 5; done'
          echo "API OK"

      - name: Logs del contenedor (diagnóstico)
        if: failure()
        run: docker compose logs --tail=50

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias Cypress
        working-directory: tests/cypress
        run: npm ci

      - name: Ejecutar Suite Cypress
        working-directory: tests/cypress
        run: npx cypress run

      - name: Publicar reporte Cypress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: tests/cypress/reports/

      - name: Logs del contenedor (diagnóstico)
        if: always()
        run: docker compose logs --tail=100

      - name: Detener AUT
        if: always()
        run: docker compose down
