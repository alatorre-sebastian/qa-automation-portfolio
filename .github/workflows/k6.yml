# Workflow: k6 Performance Tests
# Runs the k6 performance test suite against the cypress-realworld-app API
# Triggers: push and pull_request to main
# Artifacts: k6 JSON summary report

name: k6 Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start AUT with Docker Compose
        run: docker compose up -d --wait

      - name: Verify AUT is available
        run: |
          echo "Waiting for frontend (port 3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
          echo "Frontend OK"
          echo "Waiting for API (port 3001)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/ > /dev/null 2>&1; do sleep 5; done'
          echo "API OK"

      - name: Container logs (debug)
        if: failure()
        run: docker compose logs --tail=50

      - name: Run k6 suite
        working-directory: tests/k6
        run: |
          mkdir -p reports
          k6 run scripts/load-test.js --summary-export=reports/summary.json

      - name: Upload k6 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: tests/k6/reports/

      - name: Container logs
        if: always()
        run: docker compose logs --tail=100

      - name: Stop AUT
        if: always()
        run: docker compose down
