# Workflow: k6 Performance Tests
# Ejecuta la suite de pruebas de rendimiento k6 contra la API de la cypress-realworld-app
# Triggers: push y pull_request a la rama main
# Artefactos: reporte JSON de k6

name: k6 Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Instalar k6
        uses: grafana/setup-k6-action@v1

      - name: Levantar AUT con Docker Compose
        run: docker compose up -d --wait

      - name: Verificar que la AUT está disponible
        run: |
          echo "Esperando frontend (puerto 3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
          echo "Frontend OK"
          echo "Esperando API (puerto 3001)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/users > /dev/null 2>&1; do sleep 5; done'
          echo "API OK"

      - name: Logs del contenedor (diagnóstico)
        if: failure()
        run: docker compose logs --tail=50

      - name: Ejecutar Suite k6
        working-directory: tests/k6
        run: |
          mkdir -p reports
          k6 run scripts/load-test.js --summary-export=reports/summary.json

      - name: Publicar reporte k6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: tests/k6/reports/

      - name: Logs del contenedor (diagnóstico)
        if: always()
        run: docker compose logs --tail=100

      - name: Detener AUT
        if: always()
        run: docker compose down
