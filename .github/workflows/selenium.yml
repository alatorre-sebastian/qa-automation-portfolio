# Workflow: Selenium Tests
# Runs the Selenium E2E test suite against the cypress-realworld-app
# Triggers: push and pull_request to main
# Artifacts: pytest HTML report

name: Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Start AUT with Docker Compose
        run: docker compose up -d --wait

      - name: Verify AUT is available
        run: |
          echo "Waiting for frontend (port 3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
          echo "Frontend OK"
          echo "Waiting for API (port 3001)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/ > /dev/null 2>&1; do sleep 5; done'
          echo "API OK"

      - name: Container logs (debug)
        if: failure()
        run: docker compose logs --tail=50

      - name: Install Selenium dependencies
        working-directory: tests/selenium
        run: pip install -r requirements.txt

      - name: Run Selenium suite
        working-directory: tests/selenium
        run: python -m pytest tests/ --html=reports/report.html --self-contained-html

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: tests/selenium/reports/

      - name: Container logs
        if: always()
        run: docker compose logs --tail=100

      - name: Stop AUT
        if: always()
        run: docker compose down
